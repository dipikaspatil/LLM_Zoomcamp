services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Compose auto-loads these from the .env file sitting next to this
      # file (capstone/.env) — the same one config.py already reads
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY}
      # NOT localhost — "qdrant" is the service name above, which Docker's
      # internal network resolves like a hostname between containers
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  qdrant_storage:
